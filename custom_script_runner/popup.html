<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --bg-color: #121214;
            --panel-bg: #1e1e24;
            --text-color: #e1e1e6;
            --text-muted: #87868b;
            --primary: #ff5722;
            --primary-hover: #ff784e;
            --success: #4caf50;
            --danger: #f44336;
            --border: #29292e;
        }

        body {
            width: 320px;
            margin: 0;
            padding: 15px;
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            box-sizing: border-box;
            overflow: hidden;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .header h3 {
            margin: 0;
            font-size: 15px;
            color: var(--primary);
            font-weight: bold;
        }

        .version {
            font-size: 11px;
            color: var(--text-muted);
        }

        .status-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--panel-bg);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            margin-bottom: 15px;
        }

        .status-label {
            font-size: 13px;
            font-weight: bold;
        }

        /* Toggle switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 38px;
            height: 20px;
            flex-shrink: 0;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #555;
            transition: .3s;
            border-radius: 20px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--success);
        }

        input:checked + .slider:before {
            transform: translateX(18px);
        }

        .btn-dashboard {
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            text-align: center;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-bottom: 15px;
        }

        .btn-dashboard:hover {
            background-color: var(--primary-hover);
        }

        .script-list-container {
            background-color: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 15px;
        }

        .script-list-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: bold;
        }

        .script-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #25252b;
            gap: 8px;
        }

        .script-item:last-child {
            border-bottom: none;
        }

        .script-name-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            overflow: hidden;
            flex: 1;
        }

        .script-name {
            font-size: 12px;
            font-weight: bold;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .script-status-badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            flex-shrink: 0;
        }

        .script-status-badge.active {
            background-color: rgba(76, 175, 80, 0.12);
            color: var(--success);
            border: 1px solid rgba(76, 175, 80, 0.25);
        }

        .script-status-badge.disabled {
            background-color: rgba(244, 67, 54, 0.12);
            color: var(--danger);
            border: 1px solid rgba(244, 67, 54, 0.25);
        }

        .webapp-config-section {
            background-color: #121214;
            border-radius: 6px;
            padding: 8px 10px;
            margin-top: 10px;
            border: 1px solid var(--border);
        }

        .webapp-title {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .webapp-input-group {
            display: flex;
            gap: 6px;
        }

        .webapp-input {
            flex: 1;
            padding: 6px;
            border-radius: 4px;
            border: 1px solid #333;
            background-color: #1a1a1e;
            color: white;
            font-size: 11px;
            width: 100%;
            box-sizing: border-box;
        }

        .webapp-save-btn {
            background-color: var(--success);
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 11px;
            cursor: pointer;
        }

        .footer {
            margin-top: 15px;
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    
    <div class="header">
        <h3>VTDAuto</h3>
        <span class="version">v1.1</span>
    </div>

    <!-- LOCK SCREEN OVERLAY INSIDE POPUP -->
    <div id="popup-lock-overlay" style="display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px 10px; text-align: center; background-color: var(--panel-bg); border-radius: 8px; border: 1px solid var(--border); margin-bottom: 15px;">
        <span style="font-size: 36px; margin-bottom: 12px;">🔒</span>
        <h3 style="margin: 0 0 8px 0; color: var(--primary); font-size: 14px; font-weight: bold;">Yêu cầu mật khẩu bản quyền</h3>
        <p style="color: var(--text-muted); margin: 0 0 15px 0; font-size: 11px; line-height: 1.5;">Vui lòng nhập mật khẩu bản quyền để kích hoạt và sử dụng extension VTDAuto.</p>
        <div style="display: flex; flex-direction: column; gap: 8px; width: 100%; box-sizing: border-box;">
            <input type="password" id="popup-unlock-password" placeholder="Nhập mật khẩu..." style="padding: 8px; border-radius: 6px; border: 1px solid var(--border); background-color: var(--bg-color); color: white; text-align: center; font-size: 12px; outline: none; width: 100%; box-sizing: border-box;">
            <div style="display: flex; align-items: center; justify-content: center; gap: 6px; margin: 4px 0;">
                <input type="checkbox" id="popup-save-password" checked style="cursor: pointer;">
                <label for="popup-save-password" style="font-size: 11px; color: var(--text-muted); cursor: pointer; user-select: none;">Ghi nhớ mật khẩu trên thiết bị này</label>
            </div>
            <button class="btn-dashboard" id="popup-submit-unlock" style="margin-bottom: 0; padding: 8px;">Kích hoạt Extension</button>
        </div>
        <div id="popup-unlock-error" style="color: var(--danger); font-size: 11px; font-weight: bold; margin-top: 8px;"></div>
    </div>

    <div id="popup-content-main" style="display: block;">
        <!-- Global Switch -->
        <div class="status-container">
            <span class="status-label" id="status-text">Hệ thống: ĐANG BẬT</span>
            <label class="switch">
                <input type="checkbox" id="toggle-runner" checked>
                <span class="slider"></span>
            </label>
        </div>

        <!-- Matched Scripts Section -->
        <div class="script-list-container" id="script-list-container" style="display: none;">
            <div class="script-list-title">Script phù hợp trang này</div>
            <div id="active-scripts-list"></div>
        </div>

        <!-- Open Dashboard -->
        <button class="btn-dashboard" id="btn-open-dashboard">
            🚀 Mở Trang Quản Trị Script
        </button>

        <!-- Web App Config Panel -->
        <div class="webapp-config-section" id="webapp-config-section" style="display: none;">
            <div class="webapp-title">⚙️ Cài đặt URL Google Web App</div>
            <div class="webapp-input-group">
                <input type="text" id="popup-webapp-url" placeholder="https://script.google.com/..." class="webapp-input">
                <button id="popup-webapp-save" class="webapp-save-btn">Lưu</button>
            </div>
        </div>
    </div>

    <div class="footer">
        Cài đặt & Đồng bộ hóa qua Google Sheets
    </div>

    <script src="popup.js"></script>
</body>
</html>
